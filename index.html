<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Party Planner Trek</title>
    <link rel="stylesheet" href="styles.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7097635098845301"
     crossorigin="anonymous"></script>
</head>
<body>

<header>
    <div id="header-inner">
        <div>
            <h1>Party Planner Trek</h1>
            <p>Plan the perfect party, every time.</p>
        </div>
        <button id="settings-btn">Settings</button>
    </div>
</header>

<!-- Settings Panel -->
<div id="settings-overlay"></div>
<div id="settings-panel">
    <div id="settings-header">
        <h3>Settings</h3>
        <button id="settings-close">✕</button>
    </div>

    <div class="settings-group">
        <p class="settings-label">Appearance</p>
        <button id="theme-toggle">Light Mode</button>
    </div>

    <div class="settings-group">
        <p class="settings-label">Party Music</p>
        <audio id="bg-audio" loop></audio>
        <p id="music-title"></p>
        <div id="music-btns">
            <button id="music-toggle">Play</button>
        </div>
        <div id="volume-wrap">
            <span class="vol-label">Volume</span>
            <input type="range" id="volume-slider" min="0" max="100" value="50">
            <span id="volume-display">50%</span>
        </div>
    </div>
</div>

<main>

    <!-- Party Type -->
    <section id="section-type">
        <h2>What kind of party?</h2>
        <div id="party-types">
            <button class="type-btn active" data-type="birthday">Birthday</button>
            <button class="type-btn" data-type="wedding">Wedding</button>
            <button class="type-btn" data-type="graduation">Graduation</button>
            <button class="type-btn" data-type="halloween">Halloween</button>
            <button class="type-btn" data-type="holiday">Holiday</button>
            <button class="type-btn" data-type="custom">Custom</button>
        </div>
    </section>

    <div id="planner-grid">

        <!-- Checklist -->
        <section id="section-checklist">
            <div class="drag-handle" title="Drag to reorder">⠿</div>
            <h2>Checklist</h2>
            <ul id="checklist"></ul>
            <div id="checklist-add">
                <input type="text" id="checklist-input" placeholder="Add a task...">
                <button id="checklist-btn">Add</button>
            </div>
        </section>

        <!-- Guest List -->
        <section id="section-guests">
            <div class="drag-handle" title="Drag to reorder">⠿</div>
            <h2>Guest List <span id="guest-count">0</span></h2>
            <ul id="guest-list"></ul>
            <div id="guest-add">
                <input type="text" id="guest-input" placeholder="Guest name...">
                <button id="guest-btn">Add</button>
            </div>
        </section>

        <!-- Notes -->
        <section id="section-notes">
            <div class="drag-handle" title="Drag to reorder">⠿</div>
            <h2>Notes</h2>
            <textarea id="notes-input" placeholder="Write any notes about your party here..."></textarea>
        </section>

        <!-- Budget -->
        <section id="section-budget">
            <div class="drag-handle" title="Drag to reorder">⠿</div>
            <h2>Budget</h2>
            <div id="budget-summary">
                <div class="budget-stat">
                    <span class="stat-label">Total Budget</span>
                    <input type="number" id="budget-total" placeholder="0" min="0">
                </div>
                <div class="budget-stat">
                    <span class="stat-label">Spent</span>
                    <span id="budget-spent">$0</span>
                </div>
                <div class="budget-stat">
                    <span class="stat-label">Remaining</span>
                    <span id="budget-remaining">$0</span>
                </div>
            </div>
            <ul id="expense-list"></ul>
            <div id="expense-add">
                <div class="expense-row">
                    <label>Item</label>
                    <input type="text" id="expense-name" placeholder="e.g. Cake">
                </div>
                <div class="expense-row">
                    <label>Cost ($)</label>
                    <input type="number" id="expense-cost" placeholder="e.g. 50" min="0">
                </div>
                <div class="expense-row">
                    <label>Phone</label>
                    <input type="tel" id="expense-phone" placeholder="e.g. 555-1234">
                </div>
                <button id="expense-btn">Add Expense</button>
            </div>
        </section>

    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="app.js"></script>
</body>
</html>
